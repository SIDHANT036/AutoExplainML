services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    command: sh -c "sleep 5 && celery -A saas.workers.celery_app.celery worker --loglevel=info"
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"